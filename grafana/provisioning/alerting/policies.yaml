apiVersion: 1

policies:
  - orgId: 1
    receiver: grafana-default-email
    group_by: [grafana_folder, alertname]
    routes:
      - receiver: ntfy
        object_matchers:
          - [service, =, aranet4]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 1h
        continue: false
